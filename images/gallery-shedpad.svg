<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="shedSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d140d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shedPadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4545;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a2525;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shedGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>
    <pattern id="shedConcPat" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="#3a3535"/>
      <!-- Broom finish lines -->
      <line x1="0" y1="10" x2="100" y2="8" stroke="#424040" stroke-width="0.8" opacity="0.4"/>
      <line x1="0" y1="25" x2="100" y2="23" stroke="#424040" stroke-width="0.8" opacity="0.3"/>
      <line x1="0" y1="40" x2="100" y2="38" stroke="#424040" stroke-width="0.8" opacity="0.4"/>
      <line x1="0" y1="55" x2="100" y2="53" stroke="#424040" stroke-width="0.8" opacity="0.3"/>
      <line x1="0" y1="70" x2="100" y2="68" stroke="#424040" stroke-width="0.8" opacity="0.4"/>
      <line x1="0" y1="85" x2="100" y2="83" stroke="#424040" stroke-width="0.8" opacity="0.3"/>
      <!-- Aggregate dots -->
      <circle cx="20" cy="20" r="1.5" fill="#4a4848" opacity="0.5"/>
      <circle cx="60" cy="45" r="1" fill="#4a4848" opacity="0.4"/>
      <circle cx="80" cy="15" r="1.5" fill="#4a4848" opacity="0.5"/>
      <circle cx="35" cy="75" r="1" fill="#4a4848" opacity="0.4"/>
      <circle cx="75" cy="80" r="1.5" fill="#4a4848" opacity="0.5"/>
    </pattern>
  </defs>
  <!-- Sky/background -->
  <rect width="1920" height="1080" fill="url(#shedSky)"/>
  <!-- Lawn/ground -->
  <rect x="0" y="500" width="1920" height="580" fill="#0d140d"/>
  <rect x="0" y="500" width="1920" height="80" fill="#0f1a0f" opacity="0.6"/>
  <!-- Concrete shed pad -->
  <rect x="360" y="680" width="1200" height="400" fill="url(#shedConcPat)"/>
  <!-- Pad edge highlight (fresh pour look) -->
  <rect x="360" y="680" width="1200" height="6" fill="#6a6060" opacity="0.8"/>
  <rect x="360" y="680" width="6" height="400" fill="#6a6060" opacity="0.8"/>
  <rect x="1554" y="680" width="6" height="400" fill="#6a6060" opacity="0.8"/>
  <rect x="360" y="1074" width="1200" height="6" fill="#6a6060" opacity="0.8"/>
  <!-- Expansion joints on pad -->
  <line x1="360" y1="880" x2="1560" y2="880" stroke="#2a2525" stroke-width="3" opacity="0.7"/>
  <line x1="760" y1="680" x2="760" y2="1080" stroke="#2a2525" stroke-width="3" opacity="0.7"/>
  <line x1="1160" y1="680" x2="1160" y2="1080" stroke="#2a2525" stroke-width="3" opacity="0.7"/>
  <!-- Shed structure sitting on pad -->
  <!-- Shed walls -->
  <rect x="560" y="280" width="800" height="400" fill="url(#shedGrad)"/>
  <!-- Shed roof -->
  <polygon points="500,280 960,180 1420,280" fill="#1a1a28"/>
  <!-- Roof ridge line -->
  <line x1="500" y1="280" x2="1420" y2="280" stroke="#2a2a38" stroke-width="3"/>
  <!-- Shed door -->
  <rect x="860" y="460" width="200" height="220" rx="3" fill="#151520"/>
  <rect x="860" y="460" width="200" height="220" rx="3" fill="none" stroke="#2a2a3a" stroke-width="3"/>
  <!-- Door handle -->
  <circle cx="1048" cy="572" r="8" fill="#3a3a4a"/>
  <!-- Shed windows -->
  <rect x="600" y="330" width="120" height="100" rx="3" fill="#1a2a3a" stroke="#2a2a3a" stroke-width="2"/>
  <rect x="1200" y="330" width="120" height="100" rx="3" fill="#1a2a3a" stroke="#2a2a3a" stroke-width="2"/>
  <!-- Window cross bars -->
  <line x1="660" y1="330" x2="660" y2="430" stroke="#2a2a3a" stroke-width="2"/>
  <line x1="600" y1="380" x2="720" y2="380" stroke="#2a2a3a" stroke-width="2"/>
  <line x1="1260" y1="330" x2="1260" y2="430" stroke="#2a2a3a" stroke-width="2"/>
  <line x1="1200" y1="380" x2="1320" y2="380" stroke="#2a2a3a" stroke-width="2"/>
  <!-- Window glow (interior light) -->
  <rect x="602" y="332" width="116" height="96" rx="2" fill="#1a3a5a" opacity="0.4"/>
  <rect x="1202" y="332" width="116" height="96" rx="2" fill="#1a3a5a" opacity="0.4"/>
  <!-- Trees in background -->
  <ellipse cx="150" cy="400" rx="100" ry="130" fill="#080f08" opacity="0.9"/>
  <rect x="142" y="500" width="16" height="60" fill="#080f08" opacity="0.9"/>
  <ellipse cx="1770" cy="380" rx="100" ry="130" fill="#080f08" opacity="0.9"/>
  <rect x="1762" y="500" width="16" height="60" fill="#080f08" opacity="0.9"/>
  <!-- Fresh concrete markers / corner markers -->
  <circle cx="360" cy="680" r="6" fill="#6a6060"/>
  <circle cx="1560" cy="680" r="6" fill="#6a6060"/>
  <circle cx="360" cy="1080" r="6" fill="#6a6060"/>
  <circle cx="1560" cy="1080" r="6" fill="#6a6060"/>
  <!-- Dark overlay -->
  <rect width="1920" height="1080" fill="black" opacity="0.2"/>
</svg>
