<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="driveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunsetGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b1426;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#8b1a1a;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#c0392b;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7b1426;stop-opacity:0" />
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="concrete" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none"/>
      <line x1="0" y1="0" x2="60" y2="0" stroke="#555" stroke-width="0.3" opacity="0.3"/>
      <line x1="0" y1="0" x2="0" y2="60" stroke="#555" stroke-width="0.3" opacity="0.3"/>
      <circle cx="15" cy="15" r="1" fill="#666" opacity="0.2"/>
      <circle cx="45" cy="45" r="0.8" fill="#666" opacity="0.2"/>
      <circle cx="30" cy="30" r="0.5" fill="#777" opacity="0.15"/>
    </pattern>
  </defs>
  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  <!-- Sunset glow -->
  <ellipse cx="960" cy="400" rx="800" ry="300" fill="url(#sunsetGrad)" opacity="0.7"/>
  <!-- Horizon glow -->
  <rect x="0" y="480" width="1920" height="4" fill="#8b1a1a" opacity="0.3" filter="url(#blur1)"/>
  <!-- Ground / lawn -->
  <rect x="0" y="500" width="1920" height="580" fill="#0d1a0d"/>
  <!-- Lawn texture -->
  <rect x="0" y="500" width="1920" height="100" fill="#1a2e1a" opacity="0.5"/>
  <!-- Driveway - main perspective shape -->
  <polygon points="780,1080 1140,1080 1060,500 860,500" fill="url(#driveGrad)"/>
  <!-- Driveway concrete texture -->
  <polygon points="780,1080 1140,1080 1060,500 860,500" fill="url(#concrete)" opacity="0.6"/>
  <!-- Driveway expansion joints -->
  <line x1="870" y1="540" x2="1050" y2="540" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <line x1="855" y1="620" x2="1065" y2="620" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <line x1="840" y1="720" x2="1080" y2="720" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <line x1="820" y1="840" x2="1100" y2="840" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <line x1="800" y1="960" x2="1120" y2="960" stroke="#555" stroke-width="1.5" opacity="0.6"/>
  <!-- Driveway edge highlights -->
  <line x1="780" y1="1080" x2="860" y2="500" stroke="#aaa" stroke-width="2" opacity="0.4"/>
  <line x1="1140" y1="1080" x2="1060" y2="500" stroke="#aaa" stroke-width="2" opacity="0.4"/>
  <!-- House silhouette -->
  <polygon points="620,480 700,380 780,480" fill="#0d0d1a" opacity="0.9"/>
  <rect x="620" y="480" width="160" height="120" fill="#0d0d1a" opacity="0.9"/>
  <rect x="680" y="520" width="40" height="80" fill="#1a2e3a" opacity="0.8"/>
  <!-- Trees silhouettes -->
  <ellipse cx="200" cy="420" rx="80" ry="100" fill="#0a0f0a" opacity="0.8"/>
  <rect x="192" y="500" width="16" height="60" fill="#0a0f0a" opacity="0.8"/>
  <ellipse cx="350" cy="440" rx="60" ry="80" fill="#0a0f0a" opacity="0.8"/>
  <rect x="344" y="500" width="12" height="50" fill="#0a0f0a" opacity="0.8"/>
  <ellipse cx="1600" cy="430" rx="70" ry="90" fill="#0a0f0a" opacity="0.8"/>
  <rect x="1593" y="500" width="14" height="55" fill="#0a0f0a" opacity="0.8"/>
  <ellipse cx="1750" cy="450" rx="55" ry="70" fill="#0a0f0a" opacity="0.8"/>
  <!-- Stars -->
  <circle cx="100" cy="80" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="300" cy="50" r="1" fill="white" opacity="0.7"/>
  <circle cx="500" cy="100" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="700" cy="60" r="1" fill="white" opacity="0.8"/>
  <circle cx="900" cy="90" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="1200" cy="70" r="1" fill="white" opacity="0.7"/>
  <circle cx="1400" cy="110" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="1600" cy="55" r="1" fill="white" opacity="0.8"/>
  <circle cx="1800" cy="85" r="1.5" fill="white" opacity="0.7"/>
  <!-- Dark overlay for text contrast -->
  <rect width="1920" height="1080" fill="black" opacity="0.25"/>
</svg>
